services:
  # ─── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: franquicias-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: franquicias_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - franquicias-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Spring Boot App ────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: franquicias-api
    restart: unless-stopped
    environment:
      SPRING_DATA_MONGODB_HOST: "franquicias-mongodb"
      SPRING_DATA_MONGODB_PORT: "27017"
      SPRING_DATA_MONGODB_DATABASE: "franquicias_db"
      SPRING_DATA_MONGODB_USERNAME: "admin"
      SPRING_DATA_MONGODB_PASSWORD: "admin123"
      SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE: "admin"
      SERVER_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - franquicias-network

volumes:
  mongo_data:
    driver: local

networks:
  franquicias-network:
    driver: bridge