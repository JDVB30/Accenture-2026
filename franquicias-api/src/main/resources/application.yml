spring:
  application:
    name: franquicias-api
  data:
    mongodb:
      host: ${SPRING_DATA_MONGODB_HOST:franquicias-mongodb}
      port: ${SPRING_DATA_MONGODB_PORT:27017}
      database: ${SPRING_DATA_MONGODB_DATABASE:franquicias_db}
      username: ${SPRING_DATA_MONGODB_USERNAME:admin}
      password: ${SPRING_DATA_MONGODB_PASSWORD:admin123}
      authentication-database: ${SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE:admin}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.accenture.franquicias_api: DEBUG
    org.springframework.data.mongodb: DEBUG